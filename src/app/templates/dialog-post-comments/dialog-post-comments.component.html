<div mat-dialog-title class="dialog-title-row">
  <span>Comments API — Post ID <strong>{{ rowData.id }}</strong></span>
  <button mat-icon-button (click)="closeDialog()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  @if (userDataLoaded) {
    <table mat-table [dataSource]="dataSource" class="app-table">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="app-table-row">ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="app-table-row">Name</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="app-table-row">Email</th>
        <td mat-cell *matCellDef="let element">{{ element.email }}</td>
      </ng-container>

      <ng-container matColumnDef="message">
        <th mat-header-cell *matHeaderCellDef class="app-table-row">Message</th>
        <td mat-cell *matCellDef="let element">{{ element.body }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="app-table-row"></tr>

    </table>
  } @else {
    <div class="loading-icon-position">
      <mat-spinner></mat-spinner>
      <p>Loading....</p>
    </div>
  }
</mat-dialog-content>
