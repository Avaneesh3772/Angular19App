<div class="page-container">
  <p class="page-title">Template</p>
  <p class="page-subtitle">GET, POST, PUT, DELETE DEMO</p>

  <div class="action-row">
    <button mat-raised-button color="primary" (click)="openCreateNewResourceDialog()">
      <mat-icon>add</mat-icon> Add New Resource
    </button>
  </div>

  @if (userDataLoaded) {
        <table mat-table [dataSource]="dataSource" class="app-table">

          <!-- ID Column -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef class="app-table-row">ID</th>
            <td mat-cell *matCellDef="let element" width='5%'>{{ element.id }}</td>
          </ng-container>

          <!-- Title Column -->
          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef class="app-table-row">Title</th>
            <td mat-cell *matCellDef="let element" width='25%'>{{ element.title }}</td>
          </ng-container>

          <!-- User ID Column -->
          <ng-container matColumnDef="userId">
            <th mat-header-cell *matHeaderCellDef class="app-table-row">User ID</th>
            <td mat-cell *matCellDef="let element" width='10%'>{{ element.userId }}</td>
          </ng-container>

          <!-- Message Column -->
          <ng-container matColumnDef="message">
            <th mat-header-cell *matHeaderCellDef class="app-table-row">Message</th>
            <td mat-cell *matCellDef="let element" width='35%'>{{ element.body }}</td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="app-table-row">Actions</th>
            <td mat-cell *matCellDef="let element"  width='30%'>
              <button mat-stroked-button color="primary"
                      class="action-btn"
                      (click)="updateResource(element);$event.stopPropagation();">
                Update
              </button>
              <button mat-stroked-button color="warn"
                      class="action-btn"
                      (click)="deleteResource(element);$event.stopPropagation();">
                Delete
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="app-table-row" (click)="openCommentsDialog(row)"></tr>

        </table>
  } @else {
    <div class="loading-icon-position">
      <mat-spinner></mat-spinner>
      <p>Loading..</p>
    </div>
  }

</div>
