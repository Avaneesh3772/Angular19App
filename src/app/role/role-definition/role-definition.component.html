<div class="page-container">
  <p class="page-title">Role Definition</p>

  @if (displayChild2ParentData) {
    <mat-card class="child-data-card">
      <mat-card-content>
        <p><strong>Name —</strong> {{ displayChild2ParentData.name }}</p>
        <p><strong>City —</strong> {{ displayChild2ParentData.city }}</p>
      </mat-card-content>
    </mat-card>
  }
  <br>
  @if (monthlyTemplateList.length > 0) {
    <app-monthly [monthlyTemplateList]="monthlyTemplateList" />
  }
<br><br>
  @if (quarterlyTemplateList.length > 0) {
    <app-quarterly
      [quartelyTemplateList]="quarterlyTemplateList"
      (child2ParentDataTransfer)="printChild2ParentData($event)" />
  }

</div>
