<div class="header-container">
  <div class="logo">
    <h1><span class="material-icons">account_balance</span> CQRS</h1>
    <h2>Global Knowledge. Local Support.</h2>
  </div>
  <div class="user">
    <h2><span class="material-icons" style="vertical-align: middle;">account_circle</span> Username - Avaneesh Mishra</h2>
  </div>
</div>

<!-- BehaviorSubject demo banner — appears when a message is sent from the RxJS Playground -->
@if (headerMessage$ | async; as message) {
  @if (message) {
    <div class="rxjs-message-banner">
      <span class="material-icons banner-icon">notifications_active</span>
      <span class="banner-text">
        <strong>BehaviorSubject →</strong> {{ message }}
      </span>
    </div>
  }
}
